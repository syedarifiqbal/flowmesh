name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ── TypeScript Services ──────────────────────────────────────

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @flowmesh/nestjs-common build

      - name: Generate Prisma clients
        run: |
          pnpm --filter @flowmesh/ingestion prisma:generate
          pnpm --filter @flowmesh/config-service prisma:generate

      - run: pnpm turbo run typecheck

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @flowmesh/nestjs-common build

      - name: Generate Prisma clients
        run: |
          pnpm --filter @flowmesh/ingestion prisma:generate
          pnpm --filter @flowmesh/config-service prisma:generate

      - run: pnpm turbo run lint

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @flowmesh/nestjs-common build

      - name: Generate Prisma clients
        run: |
          pnpm --filter @flowmesh/ingestion prisma:generate
          pnpm --filter @flowmesh/config-service prisma:generate

      - run: pnpm vitest run --coverage --config vitest.config.ts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-unit
          path: coverage/

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_DB: flowmesh
          POSTGRES_USER: flowmesh
          POSTGRES_PASSWORD: test_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-ephemeral:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis-persistent:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: flowmesh
          RABBITMQ_DEFAULT_PASS: test_password
          RABBITMQ_DEFAULT_VHOST: flowmesh
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://flowmesh:test_password@localhost:5433/flowmesh?schema=ingestion
      REDIS_EPHEMERAL_URL: redis://localhost:6379
      REDIS_PERSISTENT_URL: redis://localhost:6380
      RABBITMQ_URL: amqp://flowmesh:test_password@localhost:5672/flowmesh
      JWT_SECRET: test_jwt_secret_for_ci_only
      JWT_REFRESH_SECRET: test_jwt_refresh_secret_for_ci_only

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @flowmesh/nestjs-common build

      - name: Generate Prisma clients
        run: |
          pnpm --filter @flowmesh/ingestion prisma:generate
          pnpm --filter @flowmesh/config-service prisma:generate

      - name: Run ingestion migrations
        run: pnpm --filter @flowmesh/ingestion prisma:migrate:deploy

      - run: pnpm vitest run --config vitest.integration.config.ts

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-integration
          path: coverage-integration/

  # ── Go Delivery Service ──────────────────────────────────────
  # Skipped until apps/delivery is scaffolded

  go-test:
    name: Go Tests (Delivery)
    runs-on: ubuntu-latest
    if: false
    steps:
      - run: echo "Delivery service not yet scaffolded"

  # ── Build Check ──────────────────────────────────────────────

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, lint, unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 8.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Build shared packages
        run: pnpm --filter @flowmesh/nestjs-common build

      - name: Generate Prisma clients
        run: |
          pnpm --filter @flowmesh/ingestion prisma:generate
          pnpm --filter @flowmesh/config-service prisma:generate

      - run: pnpm turbo run build
